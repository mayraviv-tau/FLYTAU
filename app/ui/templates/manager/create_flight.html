{% extends 'base.html' %}

{% block title %}Create Flight - FLYTAU{% endblock %}

{% block content %}
<div class="create-flight-page">
    <h1>Create New Flight</h1>

    <form method="POST" action="{{ url_for('manager.create_flight') }}" class="flight-form">
        <div class="form-section">
            <h2>Flight Details</h2>

            <div class="form-row">
                <div class="form-group">
                    <label for="origin_airport" class="form-label">Origin Airport *</label>
                    <input type="text" id="origin_airport" name="origin_airport" class="form-input" required
                           placeholder="TLV">
                </div>

                <div class="form-group">
                    <label for="destination_airport" class="form-label">Destination Airport *</label>
                    <input type="text" id="destination_airport" name="destination_airport" class="form-input" required
                           placeholder="JFK">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="plane_id" class="form-label">Aircraft *</label>
                    <select id="plane_id" name="plane_id" class="form-input" required>
                        <option value="">Select aircraft...</option>
                        {% for plane in planes %}
                        <option value="{{ plane.PlaneID }}">{{ plane.PlaneID }} - {{ plane.Manufacturer }} {{ plane.Model }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="departure_datetime" class="form-label">Departure Date & Time *</label>
                    <input type="datetime-local" id="departure_datetime" name="departure_datetime" class="form-input" required>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>Crew Assignment</h2>

            <div class="form-group">
                <label class="form-label">Pilots *</label>
                <div class="checkbox-group">
                    {% for pilot in pilots %}
                    <label class="checkbox-label">
                        <input type="checkbox" name="pilot_ids" value="{{ pilot.PilotID }}">
                        {{ pilot.FirstName }} {{ pilot.LastName }} (ID: {{ pilot.PilotID }})
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Flight Attendants *</label>
                <div class="checkbox-group">
                    {% for attendant in attendants %}
                    <label class="checkbox-label">
                        <input type="checkbox" name="attendant_ids" value="{{ attendant.AttendantID }}">
                        {{ attendant.FirstName }} {{ attendant.LastName }} (ID: {{ attendant.AttendantID }})
                    </label>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-large">Create Flight</button>
            <a href="{{ url_for('manager.dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
