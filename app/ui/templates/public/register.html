{% extends 'base.html' %}

{% block title %}Register - FLYTAU{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container register-container">
        <h1>Create Account</h1>

        <form method="POST" action="{{ url_for('public.register') }}" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="first_name" class="form-label">First Name *</label>
                    <input type="text" id="first_name" name="first_name" class="form-input" required
                           value="{{ form_data.first_name if form_data else '' }}">
                </div>

                <div class="form-group">
                    <label for="last_name" class="form-label">Last Name *</label>
                    <input type="text" id="last_name" name="last_name" class="form-input" required
                           value="{{ form_data.last_name if form_data else '' }}">
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email *</label>
                <input type="email" id="email" name="email" class="form-input" required
                       value="{{ form_data.email if form_data else '' }}">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password *</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="birth_date" class="form-label">Birth Date</label>
                    <input type="date" id="birth_date" name="birth_date" class="form-input"
                           value="{{ form_data.birth_date if form_data else '' }}">
                </div>

                <div class="form-group">
                    <label for="passport_number" class="form-label">Passport Number</label>
                    <input type="text" id="passport_number" name="passport_number" class="form-input"
                           value="{{ form_data.passport_number if form_data else '' }}">
                </div>
            </div>

            <div class="form-group">
                <label for="phone_number" class="form-label">Phone Number</label>
                <input type="tel" id="phone_number" name="phone_number" class="form-input"
                       value="{{ form_data.phone_number if form_data else '' }}">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <p class="auth-footer">
            Already have an account?
            <a href="{{ url_for('public.login') }}">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}
