{% extends 'base.html' %}

{% block title %}Login - FLYTAU{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h1>Sign In</h1>

        <form method="POST" action="{{ url_for('public.login') }}" class="auth-form">
            <div class="form-tabs">
                <label class="tab-label">
                    <input type="radio" name="user_type" value="customer" checked>
                    <span>Customer</span>
                </label>
                <label class="tab-label">
                    <input type="radio" name="user_type" value="manager">
                    <span>Manager</span>
                </label>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email / ID Number</label>
                <input type="text" id="email" name="email" class="form-input" required
                       placeholder="Enter email or manager ID">
                <input type="text" id="id_number" name="id_number" class="form-input" style="display:none;"
                       placeholder="Enter manager ID">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a href="{{ url_for('public.register') }}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
